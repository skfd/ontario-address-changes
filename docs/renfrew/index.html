<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Renfrew — Address Change Tracker</title>
  <style>
    :root { --bg:#fafafa; --surface:#ffffff; --surface2:#f5f5f5; --border:#e0e0e0;
      --text:#242424; --text-secondary:#424242; --text-dim:#616161; --accent:#0078d4;
      --accent-hover:#106ebe; --accent-bg:#eff6fc; --green:#107c10; --red:#c50f1f; --yellow:#eaa300;
      --shadow-4:0 2px 4px rgba(0,0,0,0.14),0 0 2px rgba(0,0,0,0.12);
      --shadow-8:0 4px 8px rgba(0,0,0,0.14),0 0 2px rgba(0,0,0,0.12); color-scheme:light; }
    @media (prefers-color-scheme: dark) { :root { --bg:#1f1f1f; --surface:#292929; --surface2:#333333;
      --border:#525252; --text:#ffffff; --text-secondary:#d6d6d6; --text-dim:#adadad; --accent:#2899f5;
      --accent-hover:#3aa0f3; --accent-bg:#002848; --green:#54b054; --red:#dc626d; --yellow:#f2c661;
      --shadow-4:0 2px 4px rgba(0,0,0,0.28),0 0 2px rgba(0,0,0,0.24);
      --shadow-8:0 4px 8px rgba(0,0,0,0.28),0 0 2px rgba(0,0,0,0.24); color-scheme:dark; } }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI Variable','Segoe UI',system-ui,-apple-system,sans-serif;
      background:var(--bg); color:var(--text); line-height:1.5; display:flex; justify-content:center;
      padding:48px 24px; font-size:14px; -webkit-font-smoothing:antialiased; }
    main { max-width:680px; width:100%; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; color:var(--accent-hover); }
    .back-link { display:inline-flex; gap:.35rem; font-size:12px; color:var(--text-dim); margin-bottom:1.25rem; }
    .hero { margin-bottom:32px; } .hero h1 { font-size:28px; font-weight:600; margin-bottom:8px; }
    .hero .tagline { color:var(--text-secondary); font-size:14px; margin-bottom:12px; }
    .hero .dataset-link { font-size:12px; color:var(--accent); }
    .section-header { font-size:12px; font-weight:600; margin-bottom:12px; color:var(--text-dim); }
    .reports { display:flex; flex-direction:column; gap:8px; }
    .report-link { display:block; background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:14px 16px; color:var(--text); box-shadow:var(--shadow-4);
      transition:box-shadow 0.1s, border-color 0.1s; }
    .report-link:hover { border-color:var(--accent); text-decoration:none; box-shadow:var(--shadow-8); }
    .report-link .date-row { display:flex; align-items:center; gap:8px; }
    .report-link .date { font-weight:600; font-size:14px; }
    .badge-latest { font-size:10px; padding:2px 8px; border-radius:999px; font-weight:600;
      background:var(--accent-bg); color:var(--accent); text-transform:uppercase; letter-spacing:0.04em; }
    .report-link .summary { font-size:12px; color:var(--text-dim); margin-top:4px;
      display:flex; align-items:center; gap:8px; }
    .indicator { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .indicator.green { background:var(--green); } .indicator.red { background:var(--red); }
    .indicator.yellow { background:var(--yellow); }
    .indicator.neutral { background:var(--text-dim); opacity:0.4; }
    footer { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); font-size:12px; color:var(--text-dim); }
    footer a { color:var(--text-dim); } footer a:hover { color:var(--accent); }
  </style>
</head>

<body>
  <main>
    <a class="back-link" href="../index.html">← All Ontario datasets</a>
    <div class="hero">
      <h1>Renfrew</h1>
      <p class="tagline">Tracking additions, removals, and corrections to this municipality's
        open civic-address data over time.</p>
      
    </div>

    <div class="section-header">Reports · Not identified</div>
    <div class="reports">
      
      
      <a class="report-link" href="report-2026-06-09.html">
        <div class="date-row"><span class="date">Tuesday, Jun 09, 2026</span>
          
          <span class="badge-latest" style="background:var(--surface2);color:var(--text-dim)">Baseline</span>
        </div>
        <div class="summary">
          <span class="indicator green"></span>
          
          54,029 new · 0 removed · 0 updated
        </div>
      </a>
      
      
    </div>

    <footer>Source licence: Not identified · <a href="https://github.com/skfd/ontario-address-changes">Source on GitHub</a></footer>
  </main>
</body>

</html>
