slug = "toronto"
provider = "City of Toronto"
data_url = "https://ckan0.cf.opendata.inter.prod-toronto.ca/dataset/abedd8bc-e3dd-4d45-8e69-79165a76e4fa/resource/b1c2ab72-dfe7-4b29-8550-6d1cfaa61733/download/address-points-4326.geojson"
access = "static"          # arcgis | static
format = "geojson"         # geojson | shapefile (static only)
license_name = "Open Government Licence – Toronto"
osm_compatible = "green-lwg"

# Source props whose changes are noise (internal centreline geometry, classification
# and join codes that churn daily) — excluded from change detection. Established by
# diffing snapshots: these drove ~all "modified" rows with no real address change.
ignore_fields = [
  "CENTRELINE_MEASURE", "CENTRELINE_OFFSET", "CENTRELINE_ID", "CENTRELINE_SIDE",
  "CLASS_FAMILY", "CLASS_FAMILY_DESC",
  "ADDRESS_ID", "ADDRESS_ID_LINK", "ADDRESS_POINT_ID_LINK",
  "ADDRESS_CLASS", "ADDRESS_CLASS_DESC",
  # Components/companions of the mapped canonical fields, fully contained in them:
  # ADDRESS_NUMBER = LO_NUM[SUF]-HI_NUM[SUF]; LINEAR_NAME_FULL = NAME + TYPE + DIR.
  # The ids change only alongside those renames/renumbers. Without these, every
  # rename/renumber drags 2-4 echo rows into the report (and a 2026-06 source-wide
  # HI_NUM 0->NULL recode flagged 522k rows as significant instead of location-only).
  "LO_NUM", "LO_NUM_SUF", "HI_NUM", "HI_NUM_SUF",
  "LINEAR_NAME", "LINEAR_NAME_TYPE", "LINEAR_NAME_DIR", "LINEAR_NAME_ID",
  "ADDRESS_STRING_ID",
]

[identity]
key_field = "ADDRESS_POINT_ID"  # stable municipal point id (OBJECTID is sequential, untrusted)
synth_fields = ["full"]         # fallback when key_field is null on a row

[fields]                   # source property -> canonical name; unmapped kept in props blob
number = "ADDRESS_NUMBER"
street = "LINEAR_NAME_FULL"
full   = "ADDRESS_FULL"
# Toronto address points carry no unit field

# Change classes (field values verified against the latest snapshot): a
# modification touching only these fields is reported in its humanized section
# (place renames / status changes / boundary reassignments) instead of the
# generic Updated Addresses table.
[classes]
place_name = ["PLACE_NAME", "PLACE_NAME_ALL"]
status = ["ADDRESS_STATUS", "MAINT_STAGE"]
boundary = ["MUNICIPALITY", "MUNICIPALITY_NAME", "WARD", "WARD_NAME"]
