slug = "peterborough-county"
provider = "County of Peterborough"
# Off-catalogue; found via ArcGIS Online search (official org GIS_PtboCounty). Distinct from the
# City of Peterborough (which is separated and was skipped for an all-rights-reserved licence).
# Region-wide (county townships in MUNICIPALI).
data_url = "https://services3.arcgis.com/08bk1ZSzqef9JX5q/arcgis/rest/services/Public_View_Site_Addresses_/FeatureServer/0"
access = "arcgis"
format = "geojson"
license_name = "Not identified"
osm_compatible = "unknown-review"

[identity]
key_field = "SITEADDID"                        # stable site-address id, 100% populated, order-independent (OBJECTID is sequential)
synth_fields = ["number", "street"]            # fallback; no unit field published

[fields]                                        # source property -> canonical name
number = "ADDRNUM"
street = "FULLNAME"                             # PLACENAME/MUNICIPALI/AddressCla tracked via the props blob
full   = "FULLADDR"
