slug = "niagara-falls"
provider = "City of Niagara Falls"
data_url = "https://services1.arcgis.com/WxiLK82TWf8W3O3f/arcgis/rest/services/OpenData_Address_Points/FeatureServer/43"
access = "arcgis"
format = "geojson"
license_name = "Open Government Licence - Niagara Region"
osm_compatible = "green-lwg"

# Xcoord/Ycoord duplicate the point geometry (tracked as coordinates already);
# StreetNo duplicates the mapped number field (Full_StreetNo = StreetNo + suffix).
ignore_fields = ["Xcoord", "Ycoord", "StreetNo"]

[identity]
key_field = "GSmartID"            # stable municipal point id, 100% populated and unique (OBJECTID is sequential, untrusted)
synth_fields = ["number", "street", "unit"]   # fallback only if a row ever lacks GSmartID

[fields]                          # source property -> canonical name; unmapped props kept in the tracked blob
number = "Full_StreetNo"
street = "StreetName"             # StreetType/StreetDir are separate source fields, tracked via the props blob
unit   = "Unit"
# No combined full-address field is published; `full` stays empty.
