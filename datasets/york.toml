slug = "york"
provider = "Regional Municipality of York"
data_url = "https://ww3.yorkmaps.ca/arcgis/rest/services/Geocortex/OpenData/MapServer/6"
access = "arcgis"
format = "geojson"
license_name = "York Region Open Data Licence"
osm_compatible = "green-lwg"

# PRO_DATE is a batch processing/publication stamp (String YYYYMMDD) rewritten to
# ~yesterday on every republish for all 431k rows -- pure republish churn, no
# address meaning (distinct from the real CREATE_DATE/MODDATE edit timestamps).
ignore_fields = ["PRO_DATE"]

[identity]
# Region-wide layer (431k rows, all nine York municipalities incl. Vaughan/Markham);
# the catalogue's separate "Markham" entry (ww8.yorkmaps) is the same dataset.
key_field = "PNT_GIS_ID"                       # stable municipal point id, 100% populated (OBJECTID is sequential)
synth_fields = ["number", "street", "unit"]    # fallback only if a row ever lacks PNT_GIS_ID

[fields]                                        # source property -> canonical name
number = "ADDRESS_NUMBER"
street = "FULL_STREET_NAME"                     # component street fields tracked via the props blob
unit   = "SUITE_NUMBER"
full   = "FULL_CIVIC_ADDR"

# Change classes (field values verified against the latest snapshot): a
# modification touching only these fields is reported in its humanized section
# (place renames / status changes / boundary reassignments) instead of the
# generic Updated Addresses table.
[classes]
status = ["LIFESTATUS", "MAIL_STATUS"]
boundary = ["MUNICIPALITY"]
