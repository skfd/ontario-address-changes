slug = "greater-sudbury"
provider = "City of Greater Sudbury"
# Catalogued self-hosted gis.greatersudbury.ca REST root was dead (404); resolved via ArcGIS Online
# search to the official org (owner Greater.Sudbury, services.arcgis.com/q3mIlR87lZlZsds3). Layer 2.
data_url = "https://services.arcgis.com/q3mIlR87lZlZsds3/arcgis/rest/services/Address_and_Building_Roofline/FeatureServer/2"
access = "arcgis"
format = "geojson"
license_name = "Open Data Licence - City of Greater Sudbury"
osm_compatible = "green-lwg"

[identity]
key_field = "ADDRESSID"                        # stable address id, 100% populated, order-independent (OBJECTID is sequential)
synth_fields = ["number", "street", "unit"]    # fallback only

[fields]                                        # source property -> canonical name
number = "ADDRESSNUMBER"
street = "FULLSTREETNAME"                        # BASESTREETNAME/STREETTYPE/COMMUNITY tracked via the props blob
unit   = "UNIT_OR_AMENITY"
full   = "FULLADDRESSTEXT"

# Change classes (field values verified against the latest snapshot): a
# modification touching only these fields is reported in its humanized section
# (place renames / status changes / boundary reassignments) instead of the
# generic Updated Addresses table.
[classes]
status = ["ADDRESSLIFECYCLESTATUS"]
boundary = ["COMMUNITY"]
