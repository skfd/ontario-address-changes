slug = "renfrew"
provider = "County of Renfrew"
# Upgraded 2026-06-11 from the OpenAddresses parcel-polygon cache to the County's OFFICIAL live
# NENA Site/Structure Address Point layer (owner aschultz_CofR). Region-wide (member munis incl.
# Arnprior, Pembroke, Petawawa, Renfrew, Whitewater Region in the A3 field). This re-baselined the
# dataset (different source/identity than the old static cache).
data_url = "https://services2.arcgis.com/vIya1nhxTJuEecY0/arcgis/rest/services/SiteStructureAddressPoint/FeatureServer/0"
access = "arcgis"
format = "geojson"
license_name = "Not identified"
osm_compatible = "unknown-review"

# Effective is a static effective-date re-encoded with a shifting UTC offset each
# republish (e.g. 1553576400000 -> 1553572800000 = same 2019-03-26, one hour apart):
# churns ~25k rows/day with no real change. Edit-metadata timestamps/users on this
# layer (DateUpdate, created_date/user, last_edited_user) are handled globally.
ignore_fields = ["Effective"]

[identity]
# No integer stable id (OBJECTID sequential; GlobalID/NGUID are GUIDs that can regenerate). Synthesize.
key_field = ""                                 # synthesize from address + rounded lon/lat
synth_fields = ["number", "street", "unit"]

[fields]                                        # source property -> canonical name
number = "Add_Number"
street = "St_Name"                              # St_PosTyp/St_PosDir/A3 (municipality)/STATUS tracked via the props blob
unit   = "Unit"
full   = "Full_Address"

# Change classes (field values verified against the latest snapshot): a
# modification touching only these fields is reported in its humanized section
# (place renames / status changes / boundary reassignments) instead of the
# generic Updated Addresses table.
[classes]
status = ["STATUS"]
