slug = "cornwall"
provider = "City of Cornwall"
# Catalogued static shapefile zip 301-redirects; resolved to the live hosted FeatureServer instead.
data_url = "https://services2.arcgis.com/tPtW2sjE3XOR63A7/arcgis/rest/services/AddressPoints/FeatureServer/34"
access = "arcgis"
format = "geojson"
license_name = "Open Government Licence - City of Cornwall"
osm_compatible = "green-lwg"

[identity]
key_field = "AddressID"                        # persistent address id, 100% populated, has gaps (OBJECTID is sequential)
synth_fields = ["number", "street", "unit"]    # fallback only

[fields]                                        # source property -> canonical name
number = "ST_NUMBER"
street = "STREET"                               # STREET_LNG/SUFFIX/STREET_DIR components tracked via the props blob
unit   = "UNIT"
full   = "ADDRESS"

# Change classes (field values verified against the latest snapshot): a
# modification touching only these fields is reported in its humanized section
# (place renames / status changes / boundary reassignments) instead of the
# generic Updated Addresses table.
[classes]
boundary = ["CITY"]
